{{define "empty"}}
<div style="padding: 1.5rem; max-width: 640px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i data-lucide="newspaper" style="width: 48px; height: 48px; color: var(--color-accent); margin: 0 auto 0.75rem; display: block;"></i>
        <h2 style="font-size: 1.25rem; font-weight: 600; color: var(--color-text-primary); margin-bottom: 0.5rem;">News Reader</h2>
        <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">Subscribe to RSS/Atom feeds and read articles</p>
    </div>
    <hr style="border-color: var(--color-glass-border); margin: 1.5rem 0;">
    {{.DocsHTML}}
</div>
{{end}}
