{{define "empty"}}
<div style="padding: 1.5rem; max-width: 640px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i data-lucide="newspaper" style="width: 48px; height: 48px; color: var(--color-accent); margin: 0 auto 0.75rem; display: block;"></i>
        <h2 style="font-size: 1.25rem; font-weight: 600; color: var(--color-text-primary); margin-bottom: 0.5rem;">News Reader</h2>
        <p style="color: var(--color-text-secondary); margin-bottom: 1rem;">Subscribe to RSS/Atom feeds and read articles</p>
        <p>
            <a onclick="fetch('/apps/news/help?format=html',{headers:typeof getGlobalAuthHeaders==='function'?getGlobalAuthHeaders():{}}).then(r=>r.text()).then(h=>{document.getElementById('article-list').innerHTML=h})"
               style="color: var(--color-accent); cursor: pointer; font-size: 0.875rem;">
                <i data-lucide="book-open" style="width: 14px; height: 14px; display: inline; vertical-align: middle; margin-right: 0.25rem;"></i>Documentation
            </a>
        </p>
    </div>
</div>
{{end}}
